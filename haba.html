 <!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anonymous Class Feedback Wall</title>

<link rel="stylesheet" href="feedback.css">

</head>

<body>

<!-- Logo -->
<img src="plsp.jpg" class="top-image" alt="Logo">

<!-- Header -->
<header>
    Anonymous Class Feedback Wall
</header>

<div class="container">

    <h3>Submit Feedback (Anonymous)</h3>

    <textarea id="input" placeholder="Write your feedback here..."></textarea>

    <br>

    <button onclick="addFeedback()">
        Post Feedback
    </button>

    <!-- Feedback Wall -->
    <div id="wall"></div>

    <!-- Admin -->
    <div class="admin-panel">

        <h3>Admin Panel</h3>

        <button onclick="toggleAdmin()">
            Login as Admin
        </button>

    </div>

</div>

<script>

let feedbackList = [];

let adminMode = false;

/* Feedback Class */
class Feedback{

    constructor(id, content){

        this.feedbackID = id;

        this.content = content;

        this.timestamp = new Date();

        this.status = "visible";

    }

}

/* Add Feedback */
function addFeedback(){

    let text = document.getElementById("input").value.trim();

    if(text === ""){

        alert("Please enter feedback.");

        return;

    }

    let fb = new Feedback(Date.now(), text);

    feedbackList.push(fb);

    document.getElementById("input").value = "";

    displayFeedback();

}

/* Display Feedback */
function displayFeedback(){

    let wall = document.getElementById("wall");

    wall.innerHTML = "";

    feedbackList.forEach(fb => {

        if(fb.status === "hidden" && !adminMode){

            return;

        }

        let div = document.createElement("div");

        div.className = "feedback";

        div.innerHTML = `

            <p>${fb.content}</p>

            <div class="meta">

                ${new Date(fb.timestamp).toLocaleString()}

                | Status: ${fb.status}

            </div>

            ${adminMode ? <button onclick="moderate(${fb.feedbackID})">Hide</button> : ""}

        `;

        wall.prepend(div);

    });

}

/* Hide Feedback */
function moderate(id){

    let fb = feedbackList.find(item => item.feedbackID === id);

    if(fb){

        fb.status = "hidden";

        displayFeedback();

    }

}

/* Admin Login */
function toggleAdmin(){

    let username = prompt("Enter Username:");

    let password = prompt("Enter Password:");

    if(username === "Admin" && password === "123456"){

        adminMode = true;

        alert("Admin Login Successful");

    }
    else{

        adminMode = false;

        alert("Wrong Username or Password");

    }

    displayFeedback();

}

</script>

</body>

</html>
