 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Class Feedback Wall</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#eef2f7;
    margin:0;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
}

.container{
    width:70%;
    margin:auto;
    margin-top:20px;
}

textarea{
    width:100%;
    height:80px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    resize:none;
}

button{
    margin-top:10px;
    padding:8px 15px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

.feedback{
    background:white;
    padding:12px;
    margin-top:10px;
    border-radius:6px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.meta{
    font-size:12px;
    color:gray;
    margin-top:5px;
}

.admin-panel{
    margin-top:30px;
    padding:15px;
    background:#dfe6e9;
    border-radius:6px;
}
</style>
</head>

<body>

<header>
Anonymous Class Feedback Wall
</header>

<div class="container">

<h3>Submit Feedback (Anonymous)</h3>

<textarea id="input" placeholder="Write your feedback here..."></textarea>
<br>
<button onclick="addFeedback()">Post Feedback</button>

<div id="wall"></div>

<div class="admin-panel">
    <h3>Admin Panel</h3>
    <button onclick="toggleAdmin()">Login as Admin</button>
</div>

</div>

<script>
let feedbackList = [];
let adminMode = false;

// Feedback Class
class Feedback{
    constructor(id, content){
        this.feedbackID = id;
        this.content = content;
        this.timestamp = new Date();
        this.status = "visible";
    }
}

// Add Feedback
function addFeedback(){
    let text = document.getElementById("input").value.trim();

    if(text === ""){
        alert("Please enter feedback.");
        return;
    }

    let fb = new Feedback(Date.now(), text);
    feedbackList.push(fb);

    document.getElementById("input").value = "";
    displayFeedback();
}

// Display Feedback
function displayFeedback(){
    let wall = document.getElementById("wall");
    wall.innerHTML = "";

    feedbackList.forEach(fb => {

        if(fb.status === "hidden" && !adminMode){
            return;
        }

        let div = document.createElement("div");
        div.className = "feedback";

        div.innerHTML = `
            <p>${fb.content}</p>

            <div class="meta">
                ${new Date(fb.timestamp).toLocaleString()}
                | Status: ${fb.status}
            </div>

            ${adminMode ? `<button onclick="moderate(${fb.feedbackID})">Hide</button>` : ""}
        `;

        wall.prepend(div);
    });
}

// Hide Feedback
function moderate(id){
    let fb = feedbackList.find(item => item.feedbackID === id);

    if(fb){
        fb.status = "hidden";
        displayFeedback();
    }
}

// Admin Login
function toggleAdmin(){
    let password = prompt("Enter Admin Password:");

    if(password === "admin123"){
        adminMode = true;
        alert("Admin Mode Activated");
    }else{
        alert("Wrong Password");
        adminMode = false;
    }

    displayFeedback();
}
</script>

</body>
</html>
